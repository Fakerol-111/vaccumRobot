[ppo]
num_actors = 1
num_env_steps = 64
learning_rate = 0.001
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
value_coef = 0.5
entropy_coef = 0.01
max_grad_norm = 0.5
ppo_epochs = 4
batch_size = 256
mini_batch_size = 64
total_timesteps = 10_000_000_000
save_interval = 2_000
log_interval = 500
max_npcs = 5
local_view_size = 21
num_actions = 8

[env]
default_map_list = [1, 2, 3, 4]
default_npc_count = 1
default_station_count = 4
map_strategy = "round_robin"

[curriculum]
enabled = false

[[curriculum.stage]]
name = "easy_basic"
maps = [1]
npc_count = 0
station_count = 1
total_steps = 300_000

[[curriculum.stage]]
name = "medium_npc_maze"
maps = [1, 2]
npc_count = 1
station_count = 2
total_steps = 1_000_000

[[curriculum.stage]]
name = "hard_all_maps"
maps = [1, 2, 3, 4]
npc_count = 1
station_count = 4
total_steps = 10_000_000_000

[training]
artifacts_dir = "artifacts"
model_name = "ppo_model.pt"
eval_episodes = 10
