[algorithm]
name = "grpo"            # 算法名称（用于注册表查找：ppo | grpo），各个算法参数独立，无共用参数

[ppo]
learning_rate = 0.001
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
value_coef = 0.5
entropy_coef = 0.01
max_grad_norm = 0.5
ppo_epochs = 4
batch_size = 256
mini_batch_size = 64
total_timesteps = 10_000_000_000
save_interval = 2_000          #若save_time_interval不被禁用，则不会使用这个参数
save_time_interval = 300       # 按时间保存（秒），0 = 禁用，设 300 = 每 5 分钟保存一次
log_interval = 500
max_npcs = 5
local_view_size = 21
num_actions = 8

[general]
seed = 42

[env]
default_map_list = [1, 2, 3, 4, 5, 6, 7, 8]
default_npc_count = 1
default_station_count = 4
map_strategy = "round_robin"

[curriculum]
enabled = false

[[curriculum.stage]]
name = "easy_basic"
maps = [1]
npc_count = 0
station_count = 1
total_steps = 300_000

[[curriculum.stage]]
name = "medium_npc_maze"
maps = [1, 2]
npc_count = 1
station_count = 2
total_steps = 1_000_000

[[curriculum.stage]]
name = "hard_all_maps"
maps = [1, 2, 3, 4]
npc_count = 1
station_count = 4
total_steps = 10_000_000_000

[training]
artifacts_dir = "artifacts"
model_name = "ppo_model.pt"
eval_episodes = 10

# 断点续训：设置为 checkpoint 文件路径或包含 checkpoints 的 run 目录路径
# 例如: resume_from = "artifacts/multi_map/checkpoints/20260429_120000/checkpoint_5000.pt"
# 或者: resume_from = "artifacts/multi_map/checkpoints/20260429_120000"  (自动选择最新的)
# 留空 / 注释掉 = 从头开始训练
resume_from = "D:\\ProgrammeProject\\vaccumRobot\\artifacts\\multi_map\\checkpoints\\20260429_215913"

[grpo]
learning_rate = 0.0003
max_grad_norm = 0.5
total_timesteps = 10_000_000_000
save_interval = 2_000          # 若save_time_interval被启用则不会使用此参数
save_time_interval = 300       # 按时间保存（秒），0 = 禁用，300 = 每5分钟保存一次
log_interval = 500
num_actions = 8
branch_window = 100   # 每条分支 rollout 步数
branch_interval = 50   # 主轨迹中每隔多少步做一次组更新
num_candidates = 2     # 候选动作数（K）
kl_coef = 0.1          # KL 散度惩罚系数
entropy_coef = 0.01   # 熵正则系数（负值推离均匀分布，打破对称性）
ref_sync = "episode"        # reference model 同步策略: "episode" | false

[dashboard]
enabled = true
host = "0.0.0.0"
port = 8088

[metrics]
# 滚动窗口中保留的最大记录数，训练时间越长节省内存效果越明显
max_updates = 500
max_episodes = 500
